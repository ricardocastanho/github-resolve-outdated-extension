name: Build and Upload Release Zip

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            echo "RELEASE_NAME=Release ${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          else
            VERSION=$(node -p "require('./manifest.json').version")
            RELEASE_TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
            echo "RELEASE_NAME=Auto release v${VERSION} build ${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "ZIP_NAME=ai-input-assistant-${RELEASE_TAG}.zip" >> "$GITHUB_ENV"

      - name: Build zip package
        run: |
          mkdir -p dist
          cp manifest.json dist/
          cp background.js dist/
          cp content.js dist/
          cp dialog.css dist/
          if [ -d icons ]; then
            cp -r icons dist/icons
          fi
          cd dist
          zip -r "../${ZIP_NAME}" .

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_TAG }}
          path: ${{ env.ZIP_NAME }}

      - name: Publish GitHub release with zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.IS_PRERELEASE }}
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
